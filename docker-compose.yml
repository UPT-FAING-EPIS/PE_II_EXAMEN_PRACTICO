services:
  mysql:
    image: mysql:8.4
    container_name: strategicti-mysql
    environment:
      MYSQL_DATABASE: strategicti
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - strategicti_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strategicti-backend
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_URL: jdbc:mysql://mysql:3306/strategicti?createDatabaseIfNotExist=true&serverTimezone=UTC
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./src/main/ui
      dockerfile: Dockerfile
    container_name: strategicti-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  strategicti_mysql_data:
